<body>
<div id="app"></div>
<script>
const API='https://seakebab-dashboard-production.up.railway.app';
const GS={silver:{l:'Silver',c:'#C0C0C0',i:'◆'},gold:{l:'Gold',c:'#FFD700',i:'★'},platinum:{l:'Platinum',c:'#b8b8ff',i:'✦'}};
const PL=['Instagram','TikTok','Facebook'];
const PC={Instagram:'#E1306C',TikTok:'#69C9D0',Facebook:'#1877F2'};
const SC_LINK={Instagram:'https://instagram.com/',TikTok:'https://tiktok.com/@',Facebook:'https://facebook.com/'};

function sc(s){return s>=80?'#22c55e':s>=60?'#f59e0b':'#ef4444'}
function sl(s){return s>=80?'Conforme':s>=60?'Partiel':'Non conforme'}
function cc(p,st){
  const ob=st[p.grade];
  const scores=PL.map(pl=>{const m=p.metrics[pl];const v=Math.min(m.posts/Math.max(ob.posts_month,1),1)*25+Math.min(m.reposts/Math.max(ob.reposts_month,1),1)*20+Math.min(m.republish/Math.max(ob.republish_month,1),1)*15+Math.min(m.quality/Math.max(ob.quality_min,1),1)*25+(m.tagged/Math.max(m.posts,1))*15;return Math.min(Math.round(v),100);});
  return{pp:Object.fromEntries(PL.map((pl,i)=>[pl,scores[i]])),g:Math.round(scores.reduce((a,b)=>a+b,0)/scores.length)};
}
function ring(s,sz=44){const c=sc(s);return`<div class="sr" style="width:${sz}px;height:${sz}px;border-color:${c};color:${c};font-size:${sz<42?10:12}px;background:${c}18">${s}</div>`}
function gbadge(g){const x=GS[g];return`<span class="grd" style="background:${x.c}20;border:1px solid ${x.c}60;color:${x.c}">${x.i} ${x.l}</span>`}
function pbar(v,mx){const p=Math.min((v/Math.max(mx,1))*100,100);const c=p>=100?'#22c55e':p>=60?'#f59e0b':'#ef4444';return`<div class="pb"><div class="pf" style="width:${p}%;background:${c}"></div></div>`}
function socialLink(pl,account){
  if(!account)return`<span style="color:#555;font-size:10px">Non renseigné</span>`;
  const cls={Instagram:'sl-ig',TikTok:'sl-tk',Facebook:'sl-fb'}[pl];
  const handle=account.replace('@','');
  const url=SC_LINK[pl]+handle;
  return`<a href="${url}" target="_blank" class="sl ${cls}" data-tip="Ouvrir ${pl} de ce partenaire">🔗 ${account}</a>`;
}

let state={auth:null,partners:[],settings:{brand_tag:'@seakebab',silver:{posts_month:4,reposts_month:2,republish_month:1,quality_min:60},gold:{posts_month:8,reposts_month:4,republish_month:2,quality_min:70},platinum:{posts_month:12,reposts_month:6,republish_month:3,quality_min:80}},users:[],loading:true,tab:'overview',filter:'all',modal:null,saveMsg:'',editId:null,helpSection:'intro',charts:{}};
const saved=localStorage.getItem('skauth');if(saved){try{state.auth=JSON.parse(saved);}catch(e){localStorage.removeItem('skauth');}}

function ah(){return{'Content-Type':'application/json','Authorization':'Bearer '+(state.auth?.token||'')}}
async function ag(p){const r=await fetch(API+p,{headers:ah()});if(r.status===401){logout();return null}return r.json()}
async function ap(p,b){const r=await fetch(API+p,{method:'POST',headers:ah(),body:JSON.stringify(b)});if(r.status===401){logout();return null}return r.json()}
async function apu(p,b){const r=await fetch(API+p,{method:'PUT',headers:ah(),body:JSON.stringify(b)});return r.json()}
async function adel(p){const r=await fetch(API+p,{method:'DELETE',headers:ah()});return r.json()}

async function login(u,pw){
  try{
    document.getElementById('lerr').style.display='none';
    const r=await fetch(API+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:pw})});
    const d=await r.json();
    if(d.error||!d.token){const el=document.getElementById('lerr');if(el){el.style.display='block';el.textContent=d.error||'Erreur de connexion';}return;}
    state.auth=d;localStorage.setItem('skauth',JSON.stringify(d));await loadData();
  }catch(e){const el=document.getElementById('lerr');if(el){el.style.display='block';el.textContent='Impossible de contacter le serveur. Vérifiez votre connexion.';}}
}
function logout(){if(state.auth?.token)ap('/api/logout',{});state.auth=null;localStorage.removeItem('skauth');state.partners=[];state.tab='overview';state.charts={};render();}
async function loadData(){
  state.loading=true;render();
  try{
    const[pa,se]=await Promise.all([ag('/api/partners'),ag('/api/settings')]);
    if(pa)state.partners=pa;if(se)state.settings=se;
    if(state.auth?.role==='admin'){const us=await ag('/api/users');if(us)state.users=us;}
  }catch(e){console.error('Load error:',e);}
  state.loading=false;render();
}
function flash(m,c='#22c55e'){state.saveMsg=m;state.saveMsgColor=c;render();setTimeout(()=>{state.saveMsg='';render();},3000)}
const isA=()=>state.auth?.role==='admin';
const isRO=()=>state.auth?.role!=='admin';
const isP=()=>state.auth?.role==='partner';

async function savePart(id,data){const r=await apu('/api/partners/'+id,data);if(r?.error){flash('⚠ '+r.error,'#ef4444');return;}await loadData();flash('✓ Sauvegardé');closeM();}
async function addPart(data){const r=await ap('/api/partners',data);if(r?.error){flash('⚠ '+r.error,'#ef4444');return;}await loadData();flash('✓ Partenaire ajouté');closeM();}
async function delPart(id){if(!confirm('Supprimer ce partenaire définitivement ?'))return;await adel('/api/partners/'+id);await loadData();flash('✓ Supprimé');}
async function saveSett(data){await apu('/api/settings',data);state.settings=data;flash('✓ Paramètres sauvegardés');render();}
async function addUser(data){const r=await ap('/api/users',data);if(r?.error){alert(r.error);return;}await loadData();flash('✓ Utilisateur créé');closeM();}
async function updateUser(id,data){const r=await apu('/api/users/'+id,data);if(r?.error){alert(r.error);return;}await loadData();flash('✓ Mis à jour');closeM();}
async function delUser(id){if(!confirm('Supprimer cet utilisateur ?'))return;await adel('/api/users/'+id);await loadData();flash('✓ Supprimé');}
function closeM(){state.modal=null;state.editId=null;state.editUserId=null;render();}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function exportCSV(){
  const en=state.partners.map(p=>({...p,comp:cc(p,state.settings)}));
  let csv='Partenaire,Ville,Grade,Instagram Score,TikTok Score,Facebook Score,Score Global,Statut,Compte Instagram,Compte TikTok,Compte Facebook\n';
  en.forEach(p=>{
    csv+=`"${p.name}","${p.city}","${p.grade}",${p.comp.pp.Instagram},${p.comp.pp.TikTok},${p.comp.pp.Facebook},${p.comp.g},"${sl(p.comp.g)}","${p.accounts?.Instagram||''}","${p.accounts?.TikTok||''}","${p.accounts?.Facebook||''}"\n`;
  });
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='seakebab-compliance-'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(url);
  flash('✓ CSV exporté');
}

function exportXLS(){
  const en=state.partners.map(p=>({...p,comp:cc(p,state.settings)}));
  const data=[['Partenaire','Ville','Grade','Score Instagram','Score TikTok','Score Facebook','Score Global','Statut','Compte Instagram','Compte TikTok','Compte Facebook','Posts IG','Reposts IG','Qualité IG']];
  en.forEach(p=>{

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="stl" style="margin-bottom:0">👥 Gestion des utilisateurs</div>
      <button class="addb" onclick="openAddU()" data-tip="Créer un nouvel utilisateur">+ Utilisateur</button>
    </div>
    <table class="ut">
      <thead><tr><th>Identifiant</th><th>Rôle</th><th>Partenaire lié</th><th>Actions</th></tr></thead>
      <tbody>${state.users.map(u=>{const lk=u.partnerId?state.partners.find(p=>p.id===u.partnerId):null;const rc=u.role==='admin'?'ra':u.role==='viewer'?'rv':'rp';return`
        <tr>
          <td style="color:#fff;font-weight:600">${u.username}</td>
          <td><span class="rb ${rc}">${u.role}</span></td>
          <td style="color:#888;font-size:12px">${lk?`<span style="color:${GS[lk.grade].c}">${lk.name}</span>`:'—'}</td>
          <td><div style="display:flex;gap:6px">
            <button class="be" onclick="openEditU(${u.id})" data-tip="Modifier le rôle ou le mot de passe">✏️ Modifier</button>
            ${u.id!==1?`<button class="bd" onclick="delUser(${u.id})" data-tip="Supprimer cet utilisateur">🗑</button>`:`<span style="color:#555;font-size:11px">Compte principal</span>`}
          </div></td>
        </tr>
      `;}).join('')}</tbody>
    </table>
    <div style="margin-top:16px;padding:14px;background:rgba(255,255,255,.03);border-radius:9px;font-size:11px">
      <div style="color:#d4a800;font-weight:700;margin-bottom:8px">📖 Guide des rôles</div>
      <div style="color:#aaa;margin-bottom:4px">👑 <strong style="color:#d4a800">admin</strong> — Accès complet : voir, créer, modifier, supprimer tout. Gérer les utilisateurs. Exporter les données.</div>
      <div style="color:#aaa;margin-bottom:4px">👁️ <strong style="color:#818cf8">viewer</strong> — Vue d'ensemble de tous les partenaires. Lecture seule. Peut exporter les données.</div>
      <div style="color:#aaa">🏪 <strong style="color:#22c55e">partner</strong> — Voit uniquement ses propres statistiques. Ne peut pas modifier ni supprimer.</div>

function bHelp(){
  const role=state.auth?.role||'viewer';
  const sections=role==='admin'?
    [['intro','🏠 Introduction'],['dashboard','📊 Dashboard'],['partners','👥 Partenaires'],['obligations','📋 Obligations'],['scoring','⭐ Système de score'],['users','👤 Utilisateurs'],['settings','⚙️ Paramètres'],['export','📤 Export'],['faq','❓ FAQ']]:
    role==='viewer'?[['intro','🏠 Introduction'],['dashboard','📊 Dashboard'],['partners','👥 Partenaires'],['scoring','⭐ Système de score'],['export','📤 Export'],['faq','❓ FAQ']]:
    [['intro','🏠 Mon Dashboard'],['scoring','⭐ Mon Score'],['social','🔗 Mes Réseaux'],['faq','❓ FAQ']];

  const content={
    intro: role==='admin'?`
      <div class="hh1">Bienvenue sur SEA•KEBAB Partner Compliance</div>
      <p class="ht">Ce dashboard vous permet de surveiller en temps réel la conformité de vos partenaires sur les réseaux sociaux Instagram, TikTok et Facebook.</p>
      <div class="hh2">Vos capacités en tant qu'Admin</div>
      <div class="hbox">✅ Voir tous les partenaires et leurs scores<br>✅ Ajouter, modifier et supprimer des partenaires<br>✅ Configurer les obligations par grade<br>✅ Gérer les utilisateurs et leurs rôles<br>✅ Exporter les données en CSV, Excel ou PDF</div>
      <div class="hh2">Navigation rapide</div>
      <p class="ht">Utilisez les onglets en haut pour naviguer entre les sections. Passez la souris sur les éléments pour voir des infobulles explicatives.</p>
    `:role==='viewer'?`
      <div class="hh1">Bienvenue sur SEA•KEBAB Partner Compliance</div>
      <p class="ht">Vous avez un accès en lecture seule à toutes les données de conformité des partenaires SEA•KEBAB.</p>
      <div class="hbox">👁️ Vous pouvez voir toutes les données<br>👁️ Vous pouvez exporter les rapports<br>🔒 Vous ne pouvez pas modifier les données</div>
    `:`
      <div class="hh1">Bienvenue sur votre Dashboard Partenaire</div>
      <p class="ht">Ce tableau de bord vous permet de suivre vos propres performances sur les réseaux sociaux et votre niveau de conformité avec vos obligations contractuelles SEA•KEBAB.</p>
      <div class="hbox">👁️ Vous voyez uniquement vos propres données<br>🔒 Vos données sont gérées par l'équipe SEA•KEBAB</div>
    `,
    dashboard:`
      <div class="hh1">Vue d'ensemble — Dashboard</div>
      <div class="hh2">Les KPIs en haut</div>
      <p class="ht">Les 5 cartes en haut du dashboard vous donnent un aperçu instantané : nombre total de partenaires, combien sont conformes (score ≥80), partiels (60-79), non conformes (&lt;60), et le score moyen global.</p>
      <div class="hh2">Le tableau de conformité</div>
      <p class="ht">Chaque ligne représente un partenaire. Pour chaque plateforme (Instagram, TikTok, Facebook), un anneau coloré indique le score de conformité :</p>
      <div class="hbox">🟢 Vert = Conforme (≥80/100)<br>🟡 Orange = Partiel (60-79/100)<br>🔴 Rouge = Non conforme (&lt;60/100)</div>
      <div class="hh2">Les liens réseaux sociaux</div>
      <p class="ht">Dans le tableau et les cartes partenaires, cliquez sur les icônes colorées pour accéder directement au compte du partenaire sur chaque réseau social.</p>
    `,
    scoring:`
      <div class="hh1">Système de scoring</div>
      <div class="hh2">Comment est calculé le score ?</div>
      <p class="ht">Le score de conformité (0-100) est calculé automatiquement sur 5 critères :</p>
      <div class="hbox">📝 <strong>Posts originaux</strong> — 25 points max (ratio posts publiés / posts requis)<br>🔁 <strong>Reposts</strong> — 20 points max (ratio reposts effectués / reposts requis)<br>📤 <strong>Republications</strong> — 15 points max (ratio repub. effectuées / repub. requises)<br>⭐ <strong>Score qualité</strong> — 25 points max (qualité déclarée / qualité minimum requise)<br>🏷️ <strong>Taux de tagging</strong> — 15 points max (posts tagués / posts totaux)</div>
      <div class="hh2">Les seuils</div>
      <p class="ht">Les obligations (nombre de posts, reposts, etc.) varient selon le grade :</p>
      <div class="hbox">◆ <strong style="color:#C0C0C0">Silver</strong> — Niveau d'entrée, obligations légères<br>★ <strong style="color:#FFD700">Gold</strong> — Niveau intermédiaire, obligations renforcées<br>✦ <strong style="color:#b8b8ff">Platinum</strong> — Niveau premium, obligations maximales</div>
    `,
    partners:`
      <div class="hh1">Gestion des Partenaires</div>
      <div class="hh2">Ajouter un partenaire</div>
      <p class="ht">Cliquez sur "+ Partenaire" en haut à droite. Renseignez le nom, la ville, le grade et les comptes sociaux de chaque plateforme.</p>
      <div class="hh2">Liens sociaux</div>
      <p class="ht">Dans chaque fiche partenaire, les comptes sociaux apparaissent sous forme de liens cliquables. Cliquez dessus pour ouvrir le profil directement dans un nouvel onglet.</p>
      <div class="hh2">Modifier un partenaire</div>
      <p class="ht">Cliquez sur "✏️ Éditer" pour modifier toutes les informations du partenaire : grade, comptes sociaux, et métriques mensuelles.</p>
      <div class="hbox">⚠️ Mettez à jour les métriques chaque mois pour maintenir des scores précis.</div>
    `,
    obligations:`
      <div class="hh1">Obligations contractuelles</div>
      <p class="ht">Chaque grade a des obligations spécifiques. Ces obligations définissent le minimum requis chaque mois pour être considéré "Conforme".</p>
      <div class="hh2">Modifier les obligations</div>
      <p class="ht">En tant qu'admin, allez dans ⚙️ Paramètres pour ajuster les obligations de chaque grade. Ces modifications s'appliquent immédiatement au calcul des scores.</p>
    `,
    users:`
      <div class="hh1">Gestion des utilisateurs</div>
      <div class="hh2">Créer un utilisateur</div>
      <p class="ht">Cliquez sur "+ Utilisateur" dans l'onglet "👥 Utilisateurs". Choisissez l'identifiant, le mot de passe et le rôle.</p>
      <div class="hh2">Rôles disponibles</div>
      <div class="hbox">👑 <strong style="color:#d4a800">admin</strong> — Accès complet à toutes les fonctionnalités<br>👁️ <strong style="color:#818cf8">viewer</strong> — Lecture seule de tous les partenaires<br>🏪 <strong style="color:#22c55e">partner</strong> — Accès limité à ses propres données uniquement</div>
      <div class="hh2">Lier un partenaire à un utilisateur</div>
      <p class="ht">Pour le rôle "partner", vous devez lier l'utilisateur à sa fiche partenaire. Ainsi, quand il se connecte, il ne voit que ses propres données.</p>
    `,
    settings:`
      <div class="hh1">Paramètres de l'application</div>
      <div class="hh2">Tag de marque</div>
      <p class="ht">C'est le hashtag ou la mention que tous les partenaires doivent inclure dans leurs posts. Par défaut "@seakebab". Ce tag est vérifié lors du calcul du score de conformité.</p>
      <div class="hh2">Obligations par grade</div>
      <p class="ht">Utilisez les curseurs pour ajuster le nombre de posts, reposts, republications et le score qualité minimum requis pour chaque grade. Les modifications sont appliquées instantanément.</p>
    `,
    export:`
      <div class="hh1">Export des données</div>
      <div class="hh2">Format CSV</div>
      <p class="ht">Idéal pour importer dans Excel, Google Sheets ou LibreOffice Calc. Contient toutes les données des partenaires avec leurs scores.</p>
      <div class="hh2">Format Excel (.xlsx)</div>
      <p class="ht">Fichier Excel natif avec mise en forme. Contient les données détaillées et les métriques par plateforme.</p>
      <div class="hh2">Format PDF</div>
      <p class="ht">Rapport professionnel imprimable avec le tableau de conformité complet, idéal pour les réunions ou l'archivage.</p>
      <div class="hbox">💡 Les boutons d'export se trouvent en haut de la Vue d'ensemble et de l'onglet Partenaires.</div>
    `,
    social:`
      <div class="hh1">Vos réseaux sociaux</div>
      <p class="ht">Dans votre dashboard, vous pouvez voir les comptes sociaux qui vous ont été attribués par l'équipe SEA•KEBAB. Pour modifier vos informations, contactez votre responsable SEA•KEBAB.</p>
      <div class="hh2">Vos obligations</div>
      <p class="ht">Consultez l'onglet "Obligations" pour voir exactement ce que vous devez publier chaque mois selon votre grade.</p>
    `,
    faq:`
      <div class="hh1">Questions fréquentes</div>
      <div class="hh2">Mon score est rouge, que faire ?</div>
      <p class="ht">Un score rouge (&lt;60) signifie que vous ne respectez pas vos obligations contractuelles. Vérifiez le nombre de posts, reposts et le taux de tagging requis pour votre grade.</p>
      <div class="hh2">Comment sont calculées les métriques ?</div>
      <p class="ht">Les métriques sont actuellement saisies manuellement par l'équipe SEA•KEBAB chaque mois. Une intégration automatique avec les APIs des réseaux sociaux est en cours de développement.</p>
      <div class="hh2">Je ne vois pas mes données</div>
      <p class="ht">Si vous êtes connecté en tant que partenaire et que vous ne voyez pas vos données, contactez votre responsable pour qu'il vérifie que votre compte est bien lié à votre fiche partenaire.</p>
      <div class="hh2">Comment changer mon mot de passe ?</div>
      <p class="ht">Contactez un administrateur SEA•KEBAB pour changer votre mot de passe.</p>
    `,
  };

  return`
    <div class="hg">
      <div class="hm">
        <div style="font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">Sections d'aide</div>
        ${sections.map(([k,l])=>`<div class="hmi ${state.helpSection===k?'active':''}" onclick="setHelp('${k}')">${l}</div>`).join('')}
      </div>
      <div class="hc">${content[state.helpSection]||content['intro']}</div>
    </div>
  `;
}

function bEditM(){
  const p=state.partners.find(x=>x.id===state.editId);if(!p)return'';
  const ob=state.settings[p.grade];
  return`
    <div class="mo" onclick="closeM()"><div class="md" onclick="event.stopPropagation()">
      <div class="mh"><div class="mt">✏️ Éditer — ${p.name}</div><button class="cb" onclick="closeM()">✕</button></div>
      <div class="sc"><div class="stl">Informations générales</div>
        <label>Nom</label><input type="text" id="en" value="${p.name}">
        <label>Ville</label><input type="text" id="ec" value="${p.city}">
        <label>Grade</label><div class="gb">
          ${['silver','gold','platinum'].map(g=>`<button class="gs" id="eg_${g}" onclick="selG('${g}')" style="border-color:${p.grade===g?GS[g].c:'rgba(255,255,255,.1)'};background:${p.grade===g?GS[g].c+'20':'transparent'};color:${p.grade===g?GS[g].c:'#666'}" data-tip="Grade ${GS[g].l}">${GS[g].i} ${GS[g].l}</button>`).join('')}
        </div>
      </div>
      <div class="sc"><div class="stl">Comptes sociaux</div>
        ${PL.map(pl=>`<label style="color:${PC[pl]}">${pl}</label><input type="text" id="ea_${pl}" value="${p.accounts?.[pl]||''}" placeholder="${pl==='Facebook'?'Nom de la page':'@nomducompte'}">`).join('')}
        <p style="font-size:11px;color:#666;margin-top:8px">Tag obligatoire : <strong style="color:#d4a800">${state.settings.brand_tag}</strong></p>
      </div>
      <div style="font-weight:700;font-size:10px;color:#d4a800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px">MÉTRIQUES DU MOIS</div>
      <p style="font-size:11px;color:#888;margin-bottom:12px">Seuils ${p.grade} · ${ob.posts_month} posts · ${ob.reposts_month} reposts · ${ob.republish_month} repub. · Qualité ≥${ob.quality_min}</p>
      ${PL.map(pl=>`
        <div class="sc" style="margin-bottom:10px">
          <div style="font-size:13px;font-weight:700;color:${PC[pl]};margin-bottom:11px">● ${pl}</div>
          <div class="mg">
            ${[['posts','Posts',ob.posts_month],['reposts','Reposts',ob.reposts_month],['republish','Repub.',ob.republish_month],['tagged','Tagués',ob.posts_month],['quality','Qualité',100]].map(([f,l,mx])=>`<div><div style="font-size:10px;color:#777;margin-bottom:4px">${l}</div><input type="number" id="em_${pl}_${f}" min="0" max="${f==='quality'?100:50}" value="${p.metrics[pl][f]}">${pbar(p.metrics[pl][f],mx)}</div>`).join('')}
          </div>
        </div>
      `).join('')}
      <button class="sv" onclick="subEdit(${p.id})">💾 Enregistrer les modifications</button>
      <button class="cv" onclick="closeM()">Annuler</button>
    </div></div>
  `;
}

function bAddM(){return`
  <div class="mo" onclick="closeM()"><div class="md" onclick="event.stopPropagation()" style="max-width:460px">
    <div class="mh"><div class="mt">➕ Nouveau Partenaire</div><button class="cb" onclick="closeM()">✕</button></div>
    <label>Nom du restaurant *</label><input type="text" id="an" placeholder="Ex: Le Sultan">
    <label>Ville</label><input type="text" id="ac" placeholder="Ex: Paris 18e">
    <label>Grade</label><div class="gb">
      ${['silver','gold','platinum'].map((g,i)=>`<button class="gs" id="ag_${g}" onclick="selAG('${g}')" style="border-color:${i===0?GS[g].c:'rgba(255,255,255,.1)'};background:${i===0?GS[g].c+'20':'transparent'};color:${i===0?GS[g].c:'#666'}">${GS[g].i} ${GS[g].l}</button>`).join('')}
    </div>
    <div style="margin-top:16px"><div style="font-size:10px;color:#d4a800;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Comptes sociaux</div>
      ${PL.map(pl=>`<label style="color:${PC[pl]}">${pl}</label><input type="text" id="aa_${pl}" placeholder="${pl==='Facebook'?'Nom de la page':'@nomducompte'}">`).join('')}
      <p style="font-size:11px;color:#666;margin-top:8px">Tag obligatoire : <strong style="color:#d4a800">${state.settings.brand_tag}</strong></p>
    </div>
    <button class="sv" onclick="subAdd()">Ajouter le partenaire</button>
    <button class="cv" onclick="closeM()">Annuler</button>

`}

function bAddUM(){return`
  <div class="mo" onclick="closeM()"><div class="md" onclick="event.stopPropagation()" style="max-width:440px">
    <div class="mh"><div class="mt">👤 Nouvel Utilisateur</div><button class="cb" onclick="closeM()">✕</button></div>
    <label>Identifiant *</label><input type="text" id="uu" placeholder="Ex: sultan_grill">
    <label>Mot de passe *</label><input type="password" id="up" placeholder="Choisir un mot de passe sécurisé">
    <label>Rôle</label>
    <select id="ur">
      <option value="viewer">👁️ Viewer — Vue générale, lecture seule</option>
      <option value="partner">🏪 Partner — Ses propres stats uniquement</option>
      <option value="admin">👑 Admin — Accès complet</option>
    </select>
    <label>Partenaire lié (obligatoire si rôle Partner)</label>
    <select id="upid"><option value="">— Aucun —</option>${state.partners.map(p=>`<option value="${p.id}">${p.name} (${GS[p.grade].l})</option>`).join('')}</select>
    <button class="sv" onclick="subAddU()">Créer l'utilisateur</button>
    <button class="cv" onclick="closeM()">Annuler</button>
  </div></div>
`}

function bEditUM(){
  const u=state.users.find(x=>x.id===state.editUserId);if(!u)return'';
  return`
    <div class="mo" onclick="closeM()"><div class="md" onclick="event.stopPropagation()" style="max-width:440px">
      <div class="mh"><div class="mt">✏️ Modifier — ${u.username}</div><button class="cb" onclick="closeM()">✕</button></div>
      <label>Nouveau rôle</label>
      <select id="eur">
        <option value="viewer" ${u.role==='viewer'?'selected':''}>👁️ Viewer</option>
        <option value="partner" ${u.role==='partner'?'selected':''}>🏪 Partner</option>
        <option value="admin" ${u.role==='admin'?'selected':''}>👑 Admin</option>
      </select>
      <label>Partenaire lié (si rôle Partner)</label>
      <select id="eupid"><option value="">— Aucun —</option>${state.partners.map(p=>`<option value="${p.id}" ${u.partnerId===p.id?'selected':''}>${p.name}</option>`).join('')}</select>
      <label>Nouveau mot de passe (laisser vide = inchangé)</label>
      <input type="password" id="eup" placeholder="Nouveau mot de passe (optionnel)">
      <button class="sv" onclick="subEditU(${u.id})">💾 Enregistrer</button>
      <button class="cv" onclick="closeM()">Annuler</button>
    </div></div>
  `;
}

let cEG='',cAG='silver';
function bindEv(){}
function setTab(t){state.tab=t;render();}
function setFilter(f){state.filter=f;render();}
function setHelp(s){state.helpSection=s;render();}
function openEdit(id){const p=state.partners.find(x=>x.id===id);cEG=p.grade;state.editId=id;state.modal='edit';render();}
function openAdd(){cAG='silver';state.modal='add';render();}
function openAddU(){state.modal='adduser';render();}
function openEditU(id){state.editUserId=id;state.modal='edituser';render();}
function doLogin(){const u=document.getElementById('lu')?.value?.trim(),p=document.getElementById('lp')?.value;if(!u||!p){const el=document.getElementById('lerr');if(el){el.style.display='block';el.textContent='Veuillez saisir votre identifiant et mot de passe.';}return;}login(u,p);}
function selG(g){cEG=g;['silver','gold','platinum'].forEach(x=>{const b=document.getElementById('eg_'+x);if(!b)return;b.style.borderColor=x===g?GS[x].c:'rgba(255,255,255,.1)';b.style.background=x===g?GS[x].c+'20':'transparent';b.style.color=x===g?GS[x].c:'#666';});}
function selAG(g){cAG=g;['silver','gold','platinum'].forEach(x=>{const b=document.getElementById('ag_'+x);if(!b)return;b.style.borderColor=x===g?GS[x].c:'rgba(255,255,255,.1)';b.style.background=x===g?GS[x].c+'20':'transparent';b.style.color=x===g?GS[x].c:'#666';});}
function subEdit(id){
  const p=state.partners.find(x=>x.id===id);
  const n=document.getElementById('en')?.value;const c=document.getElementById('ec')?.value;
  if(!n){flash('⚠ Le nom est obligatoire','#ef4444');return;}
  const acc={},met={};
  PL.forEach(pl=>{acc[pl]=document.getElementById('ea_'+pl)?.value||'';met[pl]={};['posts','reposts','republish','tagged','quality'].forEach(f=>{met[pl][f]=parseInt(document.getElementById('em_'+pl+'_'+f)?.value)||0;});});
  savePart(id,{...p,name:n,city:c||'',grade:cEG,avatar:n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(),accounts:acc,metrics:met});
}
function subAdd(){
  const n=document.getElementById('an')?.value?.trim();
  if(!n){flash('⚠ Le nom est obligatoire','#ef4444');return;}
  const c=document.getElementById('ac')?.value||'',acc={};
  PL.forEach(pl=>{acc[pl]=document.getElementById('aa_'+pl)?.value||'';});
  addPart({name:n,city:c,grade:cAG,avatar:n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(),joined:new Date().toISOString().slice(0,7),accounts:acc,metrics:Object.fromEntries(PL.map(p=>[p,{posts:0,reposts:0,republish:0,tagged:0,quality:0}]))});
}
function subAddU(){
  const u=document.getElementById('uu')?.value?.trim(),pw=document.getElementById('up')?.value,r=document.getElementById('ur')?.value,pid=document.getElementById('upid')?.value;
  if(!u||!pw){flash('⚠ Identifiant et mot de passe obligatoires','#ef4444');return;}
  addUser({username:u,password:pw,role:r||'viewer',partnerId:pid?parseInt(pid):null});
}
function subEditU(id){
  const r=document.getElementById('eur')?.value,pid=document.getElementById('eupid')?.value,pw=document.getElementById('eup')?.value;
  const data={role:r,partnerId:pid?parseInt(pid):null};
  if(pw)data.password=pw;
  updateUser(id,data);
}
function saveSeForm(){
  const ns={...state.settings};
  const bt=document.getElementById('brand_tag');if(bt)ns.brand_tag=bt.value;
  ['platinum','gold','silver'].forEach(g=>{['posts_month','reposts_month','republish_month','quality_min'].forEach(f=>{const el=document.querySelector(`input[data-grade="${g}"][data-field="${f}"]`);if(el)ns[g][f]=parseInt(el.value)||0;});});
  saveSett(ns);
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!state.auth)doLogin();});
if(state.auth){loadData();}else{render();}
</script>
